services:
  - type: web
    name: sigic
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sigic-db
          property: connectionString

databases:
  - name: sigic-db
    plan: free
